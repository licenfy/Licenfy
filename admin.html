<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Licenfy — Panel de Activación</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f8fafc;min-height:100vh}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:#fff;border-radius:16px;padding:36px 28px;width:100%;max-width:360px;box-shadow:0 8px 40px rgba(0,0,0,.1);text-align:center}
.login-title{font-size:1.1rem;font-weight:700;color:#0f172a;margin-bottom:6px}
.login-sub{font-size:.8rem;color:#64748b;margin-bottom:24px}
.inp{width:100%;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-family:inherit;font-size:.88rem;margin-bottom:12px;color:#0f172a;outline:none}
.inp:focus{border-color:#008bff}
.btn-primary{width:100%;padding:13px;background:linear-gradient(135deg,#1a3a6d,#008bff);color:#fff;border:none;border-radius:10px;font-size:.92rem;font-weight:700;cursor:pointer;font-family:inherit}
.btn-primary:hover{opacity:.92}
.err{background:#fef2f2;border:1.5px solid #fca5a5;border-radius:8px;padding:10px 14px;font-size:.78rem;color:#dc2626;margin-bottom:12px;display:none}

.panel{display:none;padding:0}
.topbar{background:linear-gradient(135deg,#1a3a6d,#008bff);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.topbar-brand{color:#fff;font-size:1.1rem;font-weight:800}
.topbar-sub{color:rgba(255,255,255,.7);font-size:.75rem}
.btn-logout{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:7px 14px;border-radius:8px;font-size:.78rem;cursor:pointer;font-family:inherit}
.btn-logout:hover{background:rgba(255,255,255,.25)}
.content{max-width:800px;margin:0 auto;padding:24px 16px}
.section-title{font-size:1rem;font-weight:700;color:#0f172a;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.badge-count{background:#008bff;color:#fff;font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:20px}
.card{background:#fff;border-radius:14px;border:1.5px solid #e2e8f0;margin-bottom:12px;overflow:hidden}
.card-header{padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.user-info{flex:1}
.user-name{font-size:.92rem;font-weight:700;color:#0f172a}
.user-email{font-size:.78rem;color:#64748b;margin-top:2px}
.user-date{font-size:.72rem;color:#94a3b8;margin-top:3px}
.status-badge{font-size:.72rem;font-weight:700;padding:4px 12px;border-radius:20px;white-space:nowrap}
.status-pending{background:#fef3c7;color:#d97706}
.status-active{background:#d1fae5;color:#059669}
.btn-activate{background:linear-gradient(135deg,#008bff,#1a3a6d);color:#fff;border:none;padding:10px 18px;border-radius:8px;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-activate:disabled{opacity:.5;cursor:not-allowed}
.btn-activate:hover:not(:disabled){opacity:.9}
.empty{text-align:center;padding:40px 20px;color:#94a3b8;font-size:.88rem}
.toast{position:fixed;bottom:24px;right:24px;background:#0f172a;color:#fff;padding:12px 20px;border-radius:10px;font-size:.82rem;font-weight:600;z-index:9999;transform:translateY(100px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:#059669}
.toast.error{background:#dc2626}
.loading{text-align:center;padding:40px;color:#94a3b8}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;padding:16px;text-align:center}
.stat-num{font-size:1.6rem;font-weight:800;color:#008bff}
.stat-label{font-size:.72rem;color:#64748b;margin-top:4px}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div style="font-size:1.4rem;font-weight:800;color:#1a3a6d;margin-bottom:4px">Licen<span style="color:#008bff">fy</span></div>
    <div class="login-title">Panel de Activación</div>
    <div class="login-sub">Acceso solo para administradores</div>
    <div class="err" id="loginErr"></div>
    <input class="inp" id="adminPass" type="password" placeholder="Contraseña de administrador">
    <button class="btn-primary" onclick="adminLogin()">Entrar</button>
  </div>
</div>

<!-- PANEL -->
<div class="panel" id="adminPanel">
  <div class="topbar">
    <div>
      <div class="topbar-brand">Licenfy — Activación de Fundadores</div>
      <div class="topbar-sub">Panel privado de administración</div>
    </div>
    <button class="btn-logout" onclick="adminLogout()">Salir</button>
  </div>
  <div class="content">
    <div class="stats-row" id="statsRow">
      <div class="stat-card"><div class="stat-num" id="statPending">—</div><div class="stat-label">Pendientes</div></div>
      <div class="stat-card"><div class="stat-num" id="statActive">—</div><div class="stat-label">Activos</div></div>
      <div class="stat-card"><div class="stat-num" id="statTotal">—</div><div class="stat-label">Total</div></div>
    </div>
    <div class="section-title">
      Usuarios Pendientes <span class="badge-count" id="pendingCount">0</span>
    </div>
    <div id="pendingList"><div class="loading">Cargando...</div></div>
    <div class="section-title" style="margin-top:24px">Usuarios Activos</div>
    <div id="activeList"><div class="loading">Cargando...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL = 'https://qmqianheahkqetrevveh.supabase.co';
const ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtcWlhbmhlYWhrcWV0cmV2dmVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTY0MzYsImV4cCI6MjA5MjA3MjQzNn0.SCYFX41o1p_rueWIjbmQ4QDdYaY2PVAF_idqiBqB14k';
const RESEND = 're_h2im6b5L_8a1aEmdTjjiaYAdijL2fKVUS';
const ADMIN_PASS = 'Licenfy2024!';
const _supa = supabase.createClient(SUPA_URL, ANON);

// ── AUTH ADMIN ──
function adminLogin(){
  const pass = document.getElementById('adminPass').value;
  if(pass === ADMIN_PASS){
    sessionStorage.setItem('adminAuth','1');
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('adminPanel').style.display='block';
    loadFounders();
  } else {
    const err = document.getElementById('loginErr');
    err.textContent = 'Contraseña incorrecta.';
    err.style.display='block';
  }
}

function adminLogout(){
  sessionStorage.removeItem('adminAuth');
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('adminPanel').style.display='none';
}

document.addEventListener('keydown', e => {
  if(e.key==='Enter' && document.getElementById('loginWrap').style.display!=='none') adminLogin();
});

// Verificar sesión previa
if(sessionStorage.getItem('adminAuth')==='1'){
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('adminPanel').style.display='block';
  loadFounders();
}

// ── CARGAR FUNDADORES ──
async function loadFounders(){
  try {
    const BASE = SUPA_URL + '/rest/v1';
    const headers = { 'apikey': ANON, 'Authorization': 'Bearer ' + ANON, 'Content-Type': 'application/json' };

    // Traer todos los profiles
    const profRes = await fetch(`${BASE}/profiles?select=*&order=created_at.desc`, { headers });
    const profiles = await profRes.json();

    // Traer suscripciones activas
    const now = new Date().toISOString();
    const subRes = await fetch(`${BASE}/subscriptions?status=eq.active&expires_at=gt.${now}&select=*`, { headers });
    const subs = await subRes.json();

    const activeIds = new Set((subs||[]).map(s => s.user_id));

    const pending = (profiles||[]).filter(p => !activeIds.has(p.id));
    const active = (profiles||[]).filter(p => activeIds.has(p.id));

    document.getElementById('statPending').textContent = pending.length;
    document.getElementById('statActive').textContent = active.length;
    document.getElementById('statTotal').textContent = (profiles||[]).length;
    document.getElementById('pendingCount').textContent = pending.length;

    renderList('pendingList', pending, false, subs);
    renderList('activeList', active, true, subs);
  } catch(e){
    console.error(e);
    showToast('Error al cargar datos', 'error');
  }
}

function renderList(elId, users, isActive, subs){
  const el = document.getElementById(elId);
  if(!users || users.length === 0){
    el.innerHTML = '<div class="empty">' + (isActive ? 'Sin usuarios activos aun.' : 'Sin solicitudes pendientes.') + '</div>';
    return;
  }
  el.innerHTML = users.map(u => {
    const sub = subs ? subs.find(s => s.user_id === u.id) : null;
    const expiresStr = sub ? new Date(sub.expires_at).toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'}) : '';
    const createdStr = u.created_at ? new Date(u.created_at).toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'}) : '';
    return `<div class="card">
      <div class="card-header">
        <div class="user-info">
          <div class="user-name">${u.full_name || 'Sin nombre'}</div>
          <div class="user-email">${u.email || u.id}</div>
          <div class="user-date">${isActive ? 'Acceso hasta: ' + expiresStr : 'Registrado: ' + createdStr}</div>
        </div>
        <span class="status-badge ${isActive ? 'status-active' : 'status-pending'}">${isActive ? 'Activo' : 'Pendiente'}</span>
        ${!isActive ? `<button class="btn-activate" id="btn-${u.id}" onclick="activateUser('${u.id}','${u.full_name||''}','${u.email||''}')">Activar 30 dias</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ── ACTIVAR USUARIO ──
async function activateUser(userId, name, email){
  const btn = document.getElementById('btn-' + userId);
  if(btn){ btn.disabled=true; btn.textContent='Activando...'; }

  try {
    const BASE = SUPA_URL + '/rest/v1';
    const headers = { 'apikey': ANON, 'Authorization': 'Bearer ' + ANON, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' };

    const now = new Date();
    const expires = new Date(now);
    expires.setDate(expires.getDate() + 30);

    const subData = {
      user_id: userId,
      plan_id: 'founder',
      plan_name: 'Acceso Fundador',
      status: 'active',
      activated_at: now.toISOString(),
      expires_at: expires.toISOString(),
      exam_limit: 999,
      exams_taken: 0
    };

    const res = await fetch(`${BASE}/subscriptions`, {
      method: 'POST',
      headers,
      body: JSON.stringify(subData)
    });

    if(!res.ok){
      const err = await res.text();
      throw new Error(err);
    }

    // Enviar email de bienvenida al usuario
    await sendWelcomeEmail(email, name, expires.toLocaleDateString('es-MX',{day:'2-digit',month:'long',year:'numeric'}));

    showToast('Usuario activado y bienvenida enviada!', 'success');
    setTimeout(() => loadFounders(), 1500);
  } catch(e){
    console.error(e);
    showToast('Error al activar: ' + e.message, 'error');
    if(btn){ btn.disabled=false; btn.textContent='Activar 30 dias'; }
  }
}

// ── EMAIL BIENVENIDA ──
async function sendWelcomeEmail(email, name, expiresDate){
  const firstName = name ? name.split(' ')[0] : 'Usuario';
  try {
    await fetch('https://api.resend.com/emails', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + RESEND },
      body: JSON.stringify({
        from: 'Andres de Licenfy <hola@licenfy.com>',
        to: [email],
        subject: 'Bienvenido a Licenfy - Tu acceso esta listo',
        html: '<div style="font-family:sans-serif;max-width:520px;margin:0 auto;padding:0">' +
          '<div style="background:linear-gradient(135deg,#1a3a6d,#008bff);padding:32px 28px;border-radius:12px 12px 0 0;text-align:center">' +
          '<div style="font-size:1.6rem;font-weight:800;color:#fff;margin-bottom:8px">Licen<span style="color:#7dd3fc">fy</span></div>' +
          '<h1 style="color:#fff;font-size:1.3rem;margin:0;font-weight:700">Tu acceso esta listo</h1></div>' +
          '<div style="padding:28px;background:#fff;border:1px solid #e2e8f0;border-top:none;border-radius:0 0 12px 12px">' +
          '<p style="color:#374151;margin-bottom:16px">Hola <strong>' + firstName + '</strong>,</p>' +
          '<p style="color:#374151;line-height:1.7;margin-bottom:20px">Como Usuario Fundador de Licenfy, tu acceso completo ha sido activado. Tienes <strong>30 dias gratis</strong> para prepararte para el examen CDI de California.</p>' +
          '<div style="background:#f0f9ff;border-left:4px solid #008bff;padding:16px;border-radius:0 8px 8px 0;margin-bottom:24px">' +
          '<div style="font-size:.85rem;color:#374151;line-height:1.8">' +
          '<strong>Tu acceso incluye:</strong><br>' +
          '&#9989; +300 preguntas reales del examen CDI<br>' +
          '&#9989; Simulacros cronometrados ilimitados<br>' +
          '&#9989; Tutor IA disponible 24/7<br>' +
          '&#9989; Acceso hasta: <strong>' + expiresDate + '</strong>' +
          '</div></div>' +
          '<div style="text-align:center;margin-bottom:24px">' +
          '<a href="https://licenfy.com/licenfy-app.html" style="display:inline-block;background:linear-gradient(135deg,#1a3a6d,#008bff);color:#fff;padding:14px 32px;border-radius:10px;text-decoration:none;font-weight:700;font-size:.95rem">Empezar a estudiar ahora</a>' +
          '</div>' +
          '<p style="color:#64748b;font-size:.82rem;line-height:1.7">Al terminar el mes te enviaremos un breve formulario de feedback. Al completarlo recibiras un <strong>30% de descuento</strong> en cualquier plan de suscripcion.</p>' +
          '<p style="color:#94a3b8;font-size:.75rem;margin-top:20px;text-align:center">Licenfy &mdash; hola@licenfy.com &mdash; licenfy.com</p>' +
          '</div></div>'
      })
    });
  } catch(e){ console.error('Email error:', e); }
}

// ── TOAST ──
function showToast(msg, type){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type||'');
  setTimeout(() => { t.className = 'toast'; }, 3500);
}
</script>
</body>
</html>
