<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Licenfy — Panel de Administración</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f8fafc;min-height:100vh;color:#0f172a}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:#fff;border-radius:16px;padding:36px 28px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,.1);text-align:center}
.brand{font-size:1.5rem;font-weight:800;color:#1a3a6d;margin-bottom:4px}
.brand span{color:#008bff}
.box-title{font-size:1.05rem;font-weight:700;margin-bottom:6px}
.box-sub{font-size:.8rem;color:#64748b;margin-bottom:24px}
.inp{width:100%;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-family:inherit;font-size:.88rem;margin-bottom:12px;color:#0f172a;outline:none}
.inp:focus{border-color:#008bff}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#1a3a6d,#008bff);color:#fff;border:none;border-radius:10px;font-size:.92rem;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s}
.btn:hover{opacity:.92}
.btn:disabled{opacity:.55;cursor:not-allowed}
.err{background:#fef2f2;border:1.5px solid #fca5a5;border-radius:8px;padding:10px 14px;font-size:.78rem;color:#dc2626;margin-bottom:12px;display:none;text-align:left}

.panel{display:none}
.topbar{background:linear-gradient(135deg,#1a3a6d,#008bff);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.topbar-brand{color:#fff;font-size:1.05rem;font-weight:800}
.topbar-sub{color:rgba(255,255,255,.7);font-size:.72rem}
.btn-logout{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:7px 14px;border-radius:8px;font-size:.78rem;cursor:pointer;font-family:inherit}
.btn-logout:hover{background:rgba(255,255,255,.25)}
.content{max-width:820px;margin:0 auto;padding:24px 16px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:26px}
.stat{background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;padding:18px;text-align:center}
.stat-n{font-size:1.7rem;font-weight:800;color:#008bff}
.stat-l{font-size:.72rem;color:#64748b;margin-top:4px}
.sec-title{font-size:1rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.count{background:#008bff;color:#fff;font-size:.7rem;font-weight:700;padding:2px 9px;border-radius:20px}
.card{background:#fff;border-radius:14px;border:1.5px solid #e2e8f0;margin-bottom:11px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.u-name{font-size:.92rem;font-weight:700}
.u-email{font-size:.78rem;color:#64748b;margin-top:2px}
.u-date{font-size:.72rem;color:#94a3b8;margin-top:3px}
.badge{font-size:.72rem;font-weight:700;padding:4px 12px;border-radius:20px;white-space:nowrap}
.b-pending{background:#fef3c7;color:#d97706}
.b-active{background:#d1fae5;color:#059669}
.btn-act{background:linear-gradient(135deg,#008bff,#1a3a6d);color:#fff;border:none;padding:10px 18px;border-radius:8px;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-act:disabled{opacity:.5;cursor:not-allowed}
.btn-act:hover:not(:disabled){opacity:.9}
.empty{text-align:center;padding:36px 20px;color:#94a3b8;font-size:.86rem}
.loading{text-align:center;padding:36px;color:#94a3b8}
.toast{position:fixed;bottom:24px;right:24px;background:#0f172a;color:#fff;padding:12px 20px;border-radius:10px;font-size:.82rem;font-weight:600;z-index:9999;transform:translateY(120px);opacity:0;transition:all .3s;max-width:340px}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:#059669}.toast.bad{background:#dc2626}
.right{display:flex;align-items:center;gap:12px}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="wrap" id="loginWrap">
  <div class="box">
    <div class="brand">Licen<span>fy</span></div>
    <div class="box-title">Panel de Administración</div>
    <div class="box-sub">Acceso exclusivo del administrador</div>
    <div class="err" id="loginErr"></div>
    <input class="inp" id="admEmail" type="email" placeholder="Correo de administrador" autocomplete="username">
    <input class="inp" id="admPass" type="password" placeholder="Contraseña" autocomplete="current-password">
    <button class="btn" id="loginBtn" onclick="adminLogin()">Entrar</button>
  </div>
</div>

<!-- PANEL -->
<div class="panel" id="panel">
  <div class="topbar">
    <div>
      <div class="topbar-brand">Licenfy — Administración</div>
      <div class="topbar-sub">Usuarios Fundadores</div>
    </div>
    <button class="btn-logout" onclick="adminLogout()">Salir</button>
  </div>
  <div class="content">
    <div class="stats">
      <div class="stat"><div class="stat-n" id="sP">—</div><div class="stat-l">Pendientes</div></div>
      <div class="stat"><div class="stat-n" id="sA">—</div><div class="stat-l">Activos</div></div>
      <div class="stat"><div class="stat-n" id="sT">—</div><div class="stat-l">Total</div></div>
    </div>
    <div class="sec-title">Pendientes de activación <span class="count" id="pCount">0</span></div>
    <div id="pendingList"><div class="loading">Cargando...</div></div>
    <div class="sec-title" style="margin-top:26px">Usuarios activos</div>
    <div id="activeList"><div class="loading">Cargando...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA = 'https://qmqianheahkqetrevveh.supabase.co';
const ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtcWlhbmhlYWhrcWV0cmV2dmVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTY0MzYsImV4cCI6MjA5MjA3MjQzNn0.SCYFX41o1p_rueWIjbmQ4QDdYaY2PVAF_idqiBqB14k';
const ADMIN_UID = '489cff5f-670d-41e9-94f7-b4b88c7b96fe';

function tok(){ return sessionStorage.getItem('admToken'); }
function H(){ return { 'apikey': ANON, 'Authorization': 'Bearer ' + tok(), 'Content-Type': 'application/json' }; }

// ── LOGIN ──
async function adminLogin(){
  const email = document.getElementById('admEmail').value.trim();
  const pass = document.getElementById('admPass').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginErr');
  err.style.display = 'none';
  if(!email || !pass){ err.textContent='Ingresa correo y contraseña.'; err.style.display='block'; return; }
  btn.disabled = true; btn.textContent = 'Entrando...';
  try {
    const res = await fetch(SUPA + '/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'apikey': ANON },
      body: JSON.stringify({ email, password: pass })
    });
    const d = await res.json();
    if(!res.ok){ throw new Error(d.error_description || d.msg || 'Credenciales incorrectas'); }
    if(!d.user || d.user.id !== ADMIN_UID){
      throw new Error('Esta cuenta no tiene permisos de administrador.');
    }
    sessionStorage.setItem('admToken', d.access_token);
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
    loadData();
  } catch(e){
    err.textContent = e.message || 'Error al entrar.';
    err.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Entrar';
  }
}

function adminLogout(){
  sessionStorage.removeItem('admToken');
  document.getElementById('panel').style.display = 'none';
  document.getElementById('loginWrap').style.display = 'flex';
}

document.addEventListener('keydown', function(e){
  if(e.key === 'Enter' && document.getElementById('loginWrap').style.display !== 'none') adminLogin();
});

// Sesión previa
if(tok()){
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('panel').style.display = 'block';
  loadData();
}

// ── CARGAR DATOS ──
async function loadData(){
  try {
    const fsRes = await fetch(SUPA + '/rest/v1/founder_signups?select=*&order=created_at.desc', { headers: H() });
    if(fsRes.status === 401){ sessionExpired(); return; }
    const signups = await fsRes.json();

    const now = new Date().toISOString();
    const subRes = await fetch(SUPA + '/rest/v1/subscriptions?status=eq.active&expires_at=gt.' + now + '&select=user_id,plan_name,expires_at', { headers: H() });
    const subs = subRes.ok ? await subRes.json() : [];
    const activeIds = new Set((subs||[]).map(function(s){ return s.user_id; }));

    // Excluir la cuenta del admin de la lista
    const list = (signups||[]).filter(function(u){ return u.user_id !== ADMIN_UID; });

    const pending = list.filter(function(u){ return !activeIds.has(u.user_id); });
    const active = list.filter(function(u){ return activeIds.has(u.user_id); });

    document.getElementById('sP').textContent = pending.length;
    document.getElementById('sA').textContent = active.length;
    document.getElementById('sT').textContent = list.length;
    document.getElementById('pCount').textContent = pending.length;

    renderList('pendingList', pending, false, subs);
    renderList('activeList', active, true, subs);
  } catch(e){
    console.error(e);
    showToast('Error al cargar datos', 'bad');
  }
}

function renderList(elId, users, isActive, subs){
  const el = document.getElementById(elId);
  if(!users || users.length === 0){
    el.innerHTML = '<div class="empty">' + (isActive ? 'Aún no hay usuarios activos.' : 'Sin solicitudes pendientes.') + '</div>';
    return;
  }
  el.innerHTML = users.map(function(u){
    const sub = subs ? subs.find(function(s){ return s.user_id === u.user_id; }) : null;
    const exp = sub ? new Date(sub.expires_at).toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'}) : '';
    const created = u.created_at ? new Date(u.created_at).toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'}) : '';
    const safeName = (u.full_name||'Sin nombre').replace(/'/g,"\\'");
    const safeEmail = (u.email||'').replace(/'/g,"\\'");
    return '<div class="card"><div style="flex:1"><div class="u-name">' + (u.full_name||'Sin nombre') + '</div><div class="u-email">' + (u.email||'') + '</div><div class="u-date">' + (isActive ? 'Acceso hasta: ' + exp : 'Registrado: ' + created) + '</div></div>' +
      '<div class="right"><span class="badge ' + (isActive?'b-active':'b-pending') + '">' + (isActive?'Activo':'Pendiente') + '</span>' +
      (!isActive ? '<button class="btn-act" id="b-' + u.id + '" onclick="activate(\'' + u.id + '\',\'' + u.user_id + '\',\'' + safeName + '\',\'' + safeEmail + '\')">Activar 30 días</button>' : '') +
      '</div></div>';
  }).join('');
}

// ── ACTIVAR ──
async function activate(signupId, userId, name, email){
  if(!userId || userId === 'null'){
    showToast('Este registro no tiene ID de usuario válido.', 'bad');
    return;
  }
  const btn = document.getElementById('b-' + signupId);
  if(btn){ btn.disabled = true; btn.textContent = 'Activando...'; }
  try {
    const now = new Date();
    const expires = new Date(now); expires.setDate(expires.getDate() + 30);

    const subRes = await fetch(SUPA + '/rest/v1/subscriptions', {
      method: 'POST',
      headers: Object.assign({}, H(), { 'Prefer': 'return=minimal' }),
      body: JSON.stringify({
        user_id: userId,
        plan_id: 'founder',
        plan_name: 'Acceso Fundador',
        status: 'active',
        activated_at: now.toISOString(),
        expires_at: expires.toISOString(),
        exam_limit: 999,
        exams_taken: 0
      })
    });
    if(subRes.status === 401){ sessionExpired(); return; }
    if(!subRes.ok){ const t = await subRes.text(); throw new Error(t); }

    // Marcar el signup como activado
    await fetch(SUPA + '/rest/v1/founder_signups?id=eq.' + signupId, {
      method: 'PATCH',
      headers: Object.assign({}, H(), { 'Prefer': 'return=minimal' }),
      body: JSON.stringify({ status: 'activated' })
    });

    showToast('Usuario activado por 30 días', 'ok');
    // Abrir correo de bienvenida pre-escrito
    offerWelcomeEmail(email, name, expires.toLocaleDateString('es-MX',{day:'2-digit',month:'long',year:'numeric'}));
    setTimeout(loadData, 1200);
  } catch(e){
    console.error(e);
    showToast('Error al activar: ' + (e.message||''), 'bad');
    if(btn){ btn.disabled = false; btn.textContent = 'Activar 30 días'; }
  }
}

async function offerWelcomeEmail(email, name, expiresDate){
  const first = (name||'').split(' ')[0] || '';
  try {
    const res = await fetch(SUPA + '/functions/v1/send-welcome-email', {
      method: 'POST',
      headers: H(),
      body: JSON.stringify({ email: email, nombre: first, fechaExpira: expiresDate })
    });
    if(res.ok){
      showToast('Correo de bienvenida enviado a ' + email, 'ok');
    } else {
      const t = await res.text();
      console.error('Error al enviar correo:', t);
      showToast('Activado, pero el correo no se envió (revisa consola)', 'bad');
    }
  } catch(e){
    console.error('Error al enviar correo:', e);
    showToast('Activado, pero el correo no se envió', 'bad');
  }
}

function sessionExpired(){
  showToast('Tu sesión expiró. Vuelve a entrar.', 'bad');
  setTimeout(adminLogout, 1500);
}

function showToast(msg, type){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type||'');
  setTimeout(function(){ t.className = 'toast'; }, 3800);
}
</script>
</body>
</html>
